name: Dialogue scenarios

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  dialogue-scenarios:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run offline dialogue scenario evaluator
        run: python tests/dialogue/evaluate_dialogues.py
